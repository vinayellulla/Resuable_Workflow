name: Main CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    uses: vinayellulla/Resuable_Workflow/.github/workflows/reusable-cicd.yml@main
    with:
      environment: production
      node-version: "20"
      s3-bucket: my-app-prod-bucket
    secrets: inherit