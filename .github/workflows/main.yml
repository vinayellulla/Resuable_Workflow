# ============================================================
# Caller Workflow — references the reusable pipeline
# Location: .github/workflows/main.yml
# ============================================================

name: Main CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ── Deploy to Dev on every push to develop ───────────────
  deploy-dev:
    if: github.ref == 'refs/heads/develop'
    uses: vinayellulla/Resuable_Workflow/.github/workflows/reusable-cicd.yml@main
    with:
      environment: dev
      node-version: "20"
      aws-region: ap-southeast-2
      s3-bucket: my-app-dev-bucket-123       # for frontend / static
      # eb-app-name: my-app              # uncomment for Elastic Beanstalk
      # eb-env-name: my-app-dev-env
    secrets: inherit

  # ── Deploy to Staging on PR to main ──────────────────────
  deploy-staging:
    if: github.event_name == 'pull_request'
    uses: vinayellulla/Resuable_Workflow/.github/workflows/reusable-cicd.yml@main
    with:
      environment: staging
      node-version: "20"
      aws-region: ap-southeast-2
      s3-bucket: my-app-staging-bucket
    secrets: inherit

  # ── Deploy to Production on push to main ─────────────────
  deploy-production:
    if: github.ref == 'refs/heads/main'
    uses: vinayellulla/Resuable_Workflow/.github/workflows/reusable-cicd.yml@main
    with:
      environment: production
      node-version: "20"
      aws-region: ap-southeast-2
      s3-bucket: my-app-prod-bucket
    secrets: inherit

  # ── Use the output from a deploy job ─────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: deploy-production
    if: always()
    steps:
      - name: Print deployed URL
        run: echo "App deployed to ${{ needs.deploy-production.outputs.deployed-url }}"
