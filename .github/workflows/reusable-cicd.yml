name: Reusable Node.js CI/CD → AWS

on:
  workflow_call:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: string

      node-version:
        description: "Node.js version"
        required: false
        type: string
        default: "20"

      s3-bucket:
        description: "S3 bucket name to deploy to"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:

  # ── 1. Install, Lint & Test ───────────────────────────────
  test:
    name: 🧪 Install, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

  # ── 2. Build ──────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          CI: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: client/build
          retention-days: 1

  # ── 3. Deploy ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: build
    environment: ${{ inputs.environment }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-${{ github.sha }}
          path: ./build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::666531394927:role/GitHub-runners
          aws-region: ap-southeast-2

      - name: Deploy to S3
        run: |
          aws s3 sync ./build s3://${{ inputs.s3-bucket }} --delete